<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Borneo</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@200;300;400&family=Inter:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700&family=Playfair+Display:ital,wght@0,400;1,400&family=EB+Garamond:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{--w:#fafaf8;--b:#0d0d0b;--g:#9e9b96;}
html{scroll-behavior:smooth;}
body{background:var(--w);color:var(--b);font-family:'Jost',sans-serif;min-height:100vh;cursor:none;}
#cursor{position:fixed;z-index:9999;pointer-events:none;transform:translate(-50%,-50%);width:8px;height:8px;background:var(--b);border-radius:50%;transition:width .18s,height .18s;}
#cursor.expand{width:36px;height:36px;background:transparent;border:1px solid var(--b);}
header{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:flex-start;justify-content:space-between;padding:32px 48px 0;background:transparent;}
.logo-img{height:30px;width:auto;display:block;mix-blend-mode:multiply;}
nav{display:flex;gap:28px;align-items:center;}
nav a{color:var(--b);text-decoration:none;opacity:.45;transition:opacity .3s;}
nav a:hover{opacity:1;}
nav a.icon-link img{width:20px;height:20px;object-fit:contain;mix-blend-mode:multiply;}

/* Hero — opzionale */
.proj-hero{padding:110px 48px 60px;max-width:900px;}
.proj-meta{display:flex;gap:24px;margin-bottom:10px;}
.proj-meta span{font-size:9px;letter-spacing:.22em;text-transform:uppercase;color:var(--g);}
.proj-title{font-family:'Cormorant',serif;font-size:clamp(32px,4.5vw,68px);font-weight:300;line-height:1.04;margin-bottom:28px;}
.proj-desc{font-size:14px;font-weight:300;line-height:1.8;color:#4a4845;max-width:42ch;white-space:pre-wrap;}

/* ── BLOCKS ── */
.blocks{width:100%;}

/* Each block row — full width, no padding */
.block-row{
  width:100%;
  display:flex;         /* image left or right */
  align-items:stretch;
  margin-bottom:4px;    /* small gap between blocks */
}
/* Image side — fixed width, full proportional height */
.block-row .img-side{
  flex-shrink:0;
  overflow:hidden;
  position:relative;
}
.block-row .img-side img,
.block-row .img-side video{
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
}
/* Text side — fills remaining space */
.block-row .text-side{
  flex:1;
  display:flex;
  align-items:center;
  padding:60px 48px;
  min-width:0;
}
.block-row .text-side .text-inner{
  max-width:44ch;
  font-size:14px;
  font-weight:300;
  line-height:1.85;
  color:#4a4845;
  white-space:pre-wrap;
}

/* Standalone text block (no paired image) */
.block-text-solo{
  padding:48px 48px;
  white-space:pre-wrap;
}

@media(max-width:768px){
  header{padding:24px;}
  .proj-hero{padding:80px 24px 40px;}
  .block-row{flex-direction:column;}
  .block-row .img-side{width:100%!important;height:280px;}
  .block-row .text-side{padding:32px 24px;}
  .block-text-solo{padding:32px 24px;}
}
</style>
</head>
<body>
<div id="cursor"></div>
<header>
  <a href="index.html" style="cursor:none;display:block;"><img class="logo-img" src="" alt="Borneo" id="page-logo"></a>
  <nav id="page-nav"></nav>
</header>

<div id="proj-hero-wrap"></div>
<div class="blocks" id="blocks"></div>

<script>
const cur=document.getElementById('cursor');
document.addEventListener('mousemove',e=>{cur.style.left=e.clientX+'px';cur.style.top=e.clientY+'px';});

async function load(){
  const params=new URLSearchParams(location.search);
  const pid=params.get('id');
  let D;
  try{const r=await fetch('content.json?v='+Date.now());D=await r.json();}catch(e){return;}

  document.body.style.background=(D.site?.background?.value)||'#fafaf8';
  document.getElementById('page-logo').src=D.logo||'';
  applyNav(D.nav);

  const p=pid?D.projects.find(x=>String(x.id)===pid):D.projects[0];
  if(!p){document.getElementById('blocks').innerHTML='<p style="padding:120px 48px;color:#9e9b96">Progetto non trovato.</p>';return;}

  document.title='Borneo — '+(p.title||'');
  const fd=D.site?.fontDisplay||'Cormorant';

  // ── Hero (opzionale) ─────────────────────────────
  if(p.showHero!==false){
    const hero=document.getElementById('proj-hero-wrap');
    const metas=[p.type,p.year,p.location].filter(Boolean);
    hero.innerHTML=`<div class="proj-hero">
      ${metas.length?`<div class="proj-meta">${metas.map(m=>`<span>${esc(m)}</span>`).join('')}</div>`:''}
      <h1 class="proj-title" style="font-family:'${fd}',serif">${esc(p.title||'')}</h1>
      ${p.description?`<p class="proj-desc">${esc(p.description)}</p>`:''}
    </div>`;
  } else {
    document.getElementById('proj-hero-wrap').style.paddingTop='80px';
  }

  // ── Blocks ──────────────────────────────────────
  const container=document.getElementById('blocks');
  const blist=p.blocks||[];

  // Fallback: if no blocks but has image/video, show single image block
  if(!blist.length&&(p.image||p.video)){
    blist.push({type:'image',src:p.image||'',video:p.video||'',imageStyle:p.imageStyle||{}});
  }

  if(!blist.length){container.style.paddingBottom='80px';return;}

  // Track which side the next image goes (alternates: first=left)
  let imgSide=0; // 0=left, 1=right

  blist.forEach((b,i)=>{
    if(b.type==='text'){
      // Standalone text block — full width, centered
      const st=b.textStyle||{};
      const div=document.createElement('div');
      div.className='block-text-solo';
      const maxW=st.frameWidth?st.frameWidth+'px':'640px';
      div.style.cssText=`font-family:'${st.font||'Jost'}',sans-serif;font-size:${st.size||14}px;font-weight:${st.weight||300};color:${st.color||'#4a4845'};line-height:${st.lineHeight||1.85};max-width:${maxW};`;
      if(st.align==='justify-right'){div.style.textAlign='justify';div.style.textAlignLast='right';}
      else div.style.textAlign=st.align||'left';
      div.style.marginLeft=st.align==='right'?'auto':st.align==='center'?'auto':'0';
      div.style.marginRight=st.align==='left'?'auto':st.align==='center'?'auto':'0';
      div.textContent=b.content||'';
      container.appendChild(div);
      return;
    }

    // Image/video block
    const st=b.imageStyle||{};
    const dSt=D.site?.imageStyle||{};
    // Width: use frameWidth from block, default 50vw
    const imgW=st.frameWidth||Math.round(window.innerWidth*0.5);
    const posX=st.positionX??50;
    const posY=st.positionY??50;
    const radius=st.borderRadius||0;
    const bw=st.borderWidth||0;
    const bc=st.borderColor||'transparent';
    const shadow=st.shadow||false;
    const src=b.src||b.image||'';
    const vid=b.video||'';
    const isPng=src&&/\.png$/i.test(src);

    const row=document.createElement('div');
    row.className='block-row';
    // Set flex direction based on alternating side
    const isLeft=imgSide%2===0;
    row.style.flexDirection=isLeft?'row':'row-reverse';
    imgSide++;

    // Image side
    const imgDiv=document.createElement('div');
    imgDiv.className='img-side';
    imgDiv.style.width=imgW+'px';
    imgDiv.style.maxWidth='85vw';
    if(radius)imgDiv.style.borderRadius=radius+'px';
    if(bw>0)imgDiv.style.border=`${bw}px solid ${bc}`;
    if(shadow&&!isPng)imgDiv.style.boxShadow='0 8px 40px rgba(0,0,0,.1)';

    let media;
    if(vid){
      media=document.createElement('video');
      media.src=vid;media.autoplay=true;media.muted=true;media.loop=true;media.playsInline=true;
    } else if(src){
      media=document.createElement('img');
      media.src=src;media.alt=p.title||'';media.draggable=false;
      if(isPng&&shadow)media.style.filter='drop-shadow(0 8px 32px rgba(0,0,0,.1))';
    } else {
      // empty block — skip row
      return;
    }
    media.style.objectPosition=posX+'% '+posY+'%';
    imgDiv.appendChild(media);

    // Height: natural proportions — image is NOT cropped, fills width naturally
    // We let the image determine the height of the row via its natural aspect ratio
    // But we also need object-fit:cover and the container to have a defined height
    // Solution: use a min-height from the image's natural ratio if available,
    // otherwise let the image flow at width:100%, height:auto
    media.style.width='100%';
    media.style.height='auto'; // natural height
    media.style.objectFit='contain'; // show full image, no crop

    // Empty text side (fills remaining space, shows background)
    const textDiv=document.createElement('div');
    textDiv.className='text-side';
    textDiv.style.background='transparent';
    // If there's a next text block, use it here
    const nextB=blist[i+1];
    // We don't auto-pair — text blocks are separate

    row.appendChild(imgDiv);
    row.appendChild(textDiv);
    container.appendChild(row);
  });

  document.querySelectorAll('a,button').forEach(el=>{
    el.addEventListener('mouseenter',()=>cur.classList.add('expand'));
    el.addEventListener('mouseleave',()=>cur.classList.remove('expand'));
  });
}

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function applyNav(nd){
  const nav=document.getElementById('page-nav');nav.innerHTML='';
  if(!nd)return;
  const nFont=nd.font||'Jost',nSize=(nd.size||9)+'px',nWeight=nd.weight||300;
  const nColor=nd.color||'#0d0d0b',nLS=(nd.letterSpacing??0.18)+'em',nUpper=nd.uppercase!==false;
  (nd.items||[]).forEach(item=>{
    if(item.visible===false)return;
    const a=document.createElement('a');a.href=item.href||'#';
    if(nd.layout==='icons'&&item.icon){
      a.className='icon-link';const img=document.createElement('img');img.src=item.icon;img.alt=item.label;a.appendChild(img);
    } else {
      a.textContent=item.label;
      Object.assign(a.style,{fontFamily:`'${nFont}',sans-serif`,fontSize:nSize,fontWeight:nWeight,color:nColor,letterSpacing:nLS,textTransform:nUpper?'uppercase':'none'});
    }
    nav.appendChild(a);
  });
}

load();
</script>
</body>
</html>
