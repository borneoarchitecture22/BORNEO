<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Borneo</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@200;300;400&family=Inter:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700&family=Playfair+Display:ital,wght@0,400;1,400&family=EB+Garamond:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{--w:#fafaf8;--b:#0d0d0b;--g:#9e9b96;}
html{scroll-behavior:smooth;}
body{background:var(--w);color:var(--b);font-family:'Jost',sans-serif;min-height:100vh;cursor:none;}
#cursor{position:fixed;z-index:9999;pointer-events:none;transform:translate(-50%,-50%);width:8px;height:8px;background:var(--b);border-radius:50%;transition:width .2s,height .2s;}
#cursor.expand{width:40px;height:40px;background:transparent;border:1px solid var(--b);}
header{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:flex-start;justify-content:space-between;padding:32px 48px 0;}
.logo-img{height:30px;width:auto;display:block;mix-blend-mode:multiply;}
nav{display:flex;gap:28px;align-items:center;}
nav a{color:var(--b);text-decoration:none;opacity:.45;transition:opacity .3s;font-size:9px;font-weight:300;letter-spacing:.18em;text-transform:uppercase;}
nav a:hover{opacity:1;}
nav a.icon-link img{width:20px;height:20px;object-fit:contain;mix-blend-mode:multiply;}

/* Hero — opzionale */
.proj-hero{padding:100px 48px 0;max-width:1400px;margin:0 auto;}
.proj-meta{display:flex;align-items:baseline;gap:32px;margin-bottom:12px;}
.proj-meta span{font-size:9px;letter-spacing:.22em;text-transform:uppercase;color:var(--g);}
.proj-title{font-family:'Cormorant',serif;font-size:clamp(36px,5vw,72px);font-weight:300;line-height:1.02;margin-bottom:32px;}
.proj-desc{font-size:14px;font-weight:300;line-height:1.85;color:#4a4845;max-width:44ch;white-space:pre-wrap;}

/* Blocks — full width, no max-width constraint */
.blocks{width:100%;margin:0;padding:0;}
.block{width:100%;margin-bottom:0;}

/* Image blocks — full viewport width, fixed height */
.block-img-wrap{
  width:100%;
  overflow:hidden;
  position:relative;
}
.block-img-wrap img,
.block-img-wrap video{
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
}

/* Text blocks — max-width centered, alternating alignment */
.block-text-wrap{
  max-width:800px;
  padding:60px 48px;
  white-space:pre-wrap;
}
.block-text-wrap.align-left{margin-left:0;}
.block-text-wrap.align-right{margin-left:auto;}
.block-text-wrap.align-center{margin:0 auto;}

@media(max-width:768px){
  header{padding:24px;}
  .proj-hero{padding:80px 24px 0;}
  .block-text-wrap{padding:40px 24px;}
}
</style>
</head>
<body>
<div id="cursor"></div>
<header>
  <a href="index.html" style="cursor:none;display:block;"><img class="logo-img" src="" alt="Borneo" id="page-logo"></a>
  <nav id="page-nav"></nav>
</header>

<div id="proj-hero-wrap"></div>
<div class="blocks" id="blocks"></div>

<script>
const cur=document.getElementById('cursor');
document.addEventListener('mousemove',e=>{cur.style.left=e.clientX+'px';cur.style.top=e.clientY+'px';});

async function load(){
  const params=new URLSearchParams(location.search);
  const pid=params.get('id');
  let D;
  try{const r=await fetch('content.json?v='+Date.now());D=await r.json();}catch(e){return;}

  // Site background
  document.body.style.background=(D.site?.background?.value)||'#fafaf8';
  document.getElementById('page-logo').src=D.logo||'';
  applyNav(D.nav);

  // Find project
  const p=pid?D.projects.find(x=>String(x.id)===pid):D.projects[0];
  if(!p)return;
  document.title='Borneo — '+(p.title||'');

  const fd=D.site?.fontDisplay||'Cormorant';

  // Hero section — shown only if showHero !== false
  if(p.showHero!==false){
    const hero=document.getElementById('proj-hero-wrap');
    const hasMeta=p.type||p.year||p.location;
    hero.innerHTML=`<div class="proj-hero">
      ${hasMeta?`<div class="proj-meta">
        ${p.type?`<span>${p.type}</span>`:''}
        ${p.year?`<span>${p.year}</span>`:''}
        ${p.location?`<span>${p.location}</span>`:''}
      </div>`:''}
      <h1 class="proj-title" style="font-family:'${fd}',serif">${p.title||''}</h1>
      ${p.description?`<p class="proj-desc">${p.description}</p>`:''}
    </div>`;
    // Add top margin to blocks
    document.getElementById('blocks').style.marginTop='60px';
  } else {
    document.getElementById('blocks').style.marginTop='80px'; // space for fixed header
  }

  // Build blocks
  const blocks=document.getElementById('blocks');
  const blist=p.blocks||[];

  // Fallback: if no blocks but has image, create one
  if(!blist.length&&(p.image||p.video)){
    blist.push({
      type:'image',
      src:p.image||'',
      video:p.video||'',
      imageStyle:{frameHeight:630,positionX:50,positionY:50,borderRadius:0,borderWidth:0,shadow:false}
    });
  }

  blist.forEach((b,i)=>{
    const div=document.createElement('div');
    div.className='block';

    if(b.type==='text'){
      const st=b.textStyle||{};
      const align=st.textAlign||'left'; // left, center, right
      const wrap=document.createElement('div');
      wrap.className=`block-text-wrap align-${align}`;
      wrap.style.fontFamily=`'${st.font||'Jost'}',sans-serif`;
      wrap.style.fontSize=(st.size||14)+'px';
      wrap.style.fontWeight=st.weight||300;
      wrap.style.color=st.color||'#4a4845';
      wrap.style.lineHeight=st.lineHeight||1.85;
      if(st.align==='justify-right'){wrap.style.textAlign='justify';wrap.style.textAlignLast='right';}
      else wrap.style.textAlign=st.align||'left';
      if(st.frameWidth){wrap.style.maxWidth=st.frameWidth+'px';}
      wrap.textContent=b.content||'';
      div.appendChild(wrap);

    } else {
      // Image / video block — full width, height from imageStyle
      const st=b.imageStyle||{};
      const fh=st.frameHeight||630; // default 630px height
      const posX=st.positionX!=null?st.positionX:50;
      const posY=st.positionY!=null?st.positionY:50;
      const radius=st.borderRadius||0;
      const bw=st.borderWidth||0;
      const bc=st.borderColor||'transparent';
      const shadow=st.shadow||false;
      const src=b.src||b.image||'';
      const vid=b.video||'';
      const isPng=src&&/\.png$/i.test(src);

      const wrap=document.createElement('div');
      wrap.className='block-img-wrap';
      wrap.style.height=fh+'px';
      if(radius)wrap.style.borderRadius=radius+'px';
      if(bw>0)wrap.style.border=`${bw}px solid ${bc}`;
      if(shadow&&!isPng)wrap.style.boxShadow='0 8px 40px rgba(0,0,0,.12)';

      let media;
      if(vid){
        media=document.createElement('video');
        media.src=vid;media.autoplay=true;media.muted=true;media.loop=true;media.playsInline=true;
      } else if(src){
        media=document.createElement('img');
        media.src=src;media.alt=p.title||'';media.draggable=false;
        if(isPng&&shadow)media.style.filter='drop-shadow(0 8px 32px rgba(0,0,0,.12))';
      } else {div.appendChild(wrap);blocks.appendChild(div);return;}

      media.style.objectPosition=posX+'% '+posY+'%';
      wrap.appendChild(media);
      div.appendChild(wrap);
    }
    blocks.appendChild(div);
  });

  // Wire cursor expand on links
  document.querySelectorAll('a,button').forEach(el=>{
    el.addEventListener('mouseenter',()=>cur.classList.add('expand'));
    el.addEventListener('mouseleave',()=>cur.classList.remove('expand'));
  });
}

function applyNav(nd){
  const nav=document.getElementById('page-nav');nav.innerHTML='';
  if(!nd)return;
  const nFont=nd.font||'Jost',nSize=(nd.size||9)+'px',nWeight=nd.weight||300;
  const nColor=nd.color||'#0d0d0b',nLS=(nd.letterSpacing??0.18)+'em',nUpper=nd.uppercase!==false;
  (nd.items||[]).forEach(item=>{
    if(item.visible===false)return;
    const a=document.createElement('a');a.href=item.href||'#';
    if(nd.layout==='icons'&&item.icon){
      a.className='icon-link';const img=document.createElement('img');img.src=item.icon;img.alt=item.label;a.appendChild(img);
    } else {
      a.textContent=item.label;
      Object.assign(a.style,{fontFamily:`'${nFont}',sans-serif`,fontSize:nSize,fontWeight:nWeight,color:nColor,letterSpacing:nLS,textTransform:nUpper?'uppercase':'none'});
    }
    nav.appendChild(a);
  });
}

load();
</script>
</body>
</html>
