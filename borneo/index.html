<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Borneo</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@200;300;400&family=DM+Serif+Display:ital@0;1&family=Playfair+Display:ital,wght@0,400;1,400&family=EB+Garamond:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{--w:#fafaf8;--b:#0d0d0b;--g:#9e9b96;--thin:#d4d1cc;--speed:.72s;--ease:cubic-bezier(0.76,0,0.24,1);}
html,body{width:100%;height:100%;overflow:hidden;background:var(--w);color:var(--b);cursor:none;}

/* ── CURSOR ── */
#cursor{position:fixed;z-index:9999;pointer-events:none;transform:translate(-50%,-50%);}
#cursor.dot{width:8px;height:8px;background:var(--b);border-radius:50%;display:block;transition:width .2s,height .2s;}
#cursor.dot.expand{width:52px;height:52px;background:transparent;border:1px solid var(--b);}
#cursor.img-cur{display:block;}
#cursor.img-cur img{width:40px;height:40px;object-fit:contain;}

/* ── BG ── */
#bg-layer{position:fixed;inset:0;z-index:0;}
#bg-img-layer{position:fixed;inset:0;z-index:0;background-size:cover;background-position:center;opacity:0;}

/* ── LOGO — independently positioned ── */
#site-logo-wrap{
  position:fixed;z-index:100;
  animation:fade-up .8s var(--ease) .1s both;
}
/* logo positions */
#site-logo-wrap.tl{top:32px;left:48px;}
#site-logo-wrap.tc{top:32px;left:50%;transform:translateX(-50%);}
#site-logo-wrap.tr{top:32px;right:48px;}
#site-logo-wrap.bl{bottom:28px;left:48px;}
#site-logo-wrap.bc{bottom:28px;left:50%;transform:translateX(-50%);}
#site-logo-wrap.br{bottom:28px;right:48px;}
.logo-img{height:32px;width:auto;display:block;mix-blend-mode:multiply;}

/* ── NAV — independently positioned ── */
#site-nav-wrap{
  position:fixed;z-index:100;
  animation:fade-up .8s var(--ease) .15s both;
}
#site-nav-wrap.tl{top:36px;left:48px;}
#site-nav-wrap.tc{top:36px;left:50%;transform:translateX(-50%);}
#site-nav-wrap.tr{top:36px;right:48px;}
#site-nav-wrap.bl{bottom:32px;left:48px;}
#site-nav-wrap.bc{bottom:32px;left:50%;transform:translateX(-50%);}
#site-nav-wrap.br{bottom:32px;right:48px;}
nav{display:flex;gap:28px;align-items:center;}
nav a{color:var(--b);text-decoration:none;opacity:.45;transition:opacity .3s;display:flex;align-items:center;}
nav a:hover{opacity:1;}
nav a.tl-link{font-size:9px;font-weight:300;letter-spacing:.18em;text-transform:uppercase;}
nav a.il-link img{width:22px;height:22px;object-fit:contain;mix-blend-mode:multiply;}

/* ── PROJECT INFO — independently positioned ── */
#proj-info-wrap{
  position:fixed;z-index:100;
  pointer-events:none;
  animation:fade-up .8s var(--ease) .3s both;
}
#proj-info-wrap.tl{top:80px;left:48px;}
#proj-info-wrap.tc{top:80px;left:50%;transform:translateX(-50%);text-align:center;}
#proj-info-wrap.tr{top:80px;right:48px;text-align:right;}
#proj-info-wrap.bl{bottom:32px;left:48px;}
#proj-info-wrap.bc{bottom:32px;left:50%;transform:translateX(-50%);text-align:center;}
#proj-info-wrap.br{bottom:32px;right:48px;text-align:right;}
.proj-index{font-size:9px;font-weight:200;letter-spacing:.22em;text-transform:uppercase;color:var(--g);}
.proj-name{font-size:22px;font-weight:300;letter-spacing:.02em;line-height:1;}
.proj-tag{font-size:9px;font-weight:200;letter-spacing:.18em;text-transform:uppercase;color:var(--g);margin-top:2px;}

/* ── PROGRESS — independently positioned ── */
#proj-progress-wrap{
  position:fixed;z-index:100;
  pointer-events:none;
  animation:fade-up .8s var(--ease) .35s both;
}
#proj-progress-wrap.tl{top:80px;left:48px;}
#proj-progress-wrap.tc{top:80px;left:50%;transform:translateX(-50%);}
#proj-progress-wrap.tr{top:80px;right:48px;}
#proj-progress-wrap.bl{bottom:32px;left:48px;}
#proj-progress-wrap.bc{bottom:32px;left:50%;transform:translateX(-50%);}
#proj-progress-wrap.br{bottom:32px;right:48px;}
.progress-row{display:flex;align-items:center;gap:16px;}
.progress-bar{width:100px;height:1px;background:var(--thin);position:relative;overflow:hidden;}
.progress-fill{position:absolute;top:0;left:0;height:100%;background:var(--b);transition:width var(--speed) var(--ease);}
.progress-count{font-size:9px;font-weight:200;letter-spacing:.15em;color:var(--g);white-space:nowrap;}

/* ── STAGE ── */
#stage{position:fixed;inset:0;z-index:1;display:flex;align-items:center;justify-content:center;}
.slide{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none;opacity:0;}
.slide.active{pointer-events:auto;z-index:10;}
.slide-inner{position:relative;display:flex;align-items:center;justify-content:center;overflow:hidden;}
.slide-inner img,.slide-inner video{display:block;transition:transform .4s var(--ease);}
.slide-inner img{background:transparent;}
.slide-inner:hover img,.slide-inner:hover video{transform:scale(1.015);}

/* ── OVERLAY ── */
#overlay{position:fixed;inset:0;z-index:500;background:var(--w);display:flex;flex-direction:column;opacity:0;pointer-events:none;transition:opacity .55s var(--ease);overflow-y:auto;}
#overlay.open{opacity:1;pointer-events:auto;}
.ov-hdr{display:flex;justify-content:space-between;align-items:flex-start;padding:36px 48px 0;position:sticky;top:0;background:var(--w);z-index:10;}
.ov-close{font-size:9px;font-weight:300;letter-spacing:.22em;text-transform:uppercase;background:none;border:none;color:var(--b);cursor:none;opacity:.45;transition:opacity .3s;}
.ov-close:hover{opacity:1;}
.ov-body{flex:1;padding:60px 48px 80px;display:grid;grid-template-columns:1fr 1fr;gap:60px 80px;align-items:start;}
.ov-media img,.ov-media video{width:100%;background:transparent;}
.ov-info{display:flex;flex-direction:column;gap:32px;}
.ov-title{font-size:clamp(28px,4vw,52px);font-weight:300;line-height:1.05;}
.ov-dets{display:grid;grid-template-columns:auto 1fr;gap:10px 24px;font-size:10px;font-weight:300;letter-spacing:.15em;text-transform:uppercase;}
.ov-dets dt{color:var(--g);}
.ov-desc{font-size:16px;font-weight:300;line-height:1.75;color:#4a4845;max-width:38ch;}

@keyframes fade-up{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:700px){
  #site-logo-wrap.tl,#site-logo-wrap.bl{left:24px;}
  #site-logo-wrap.tr,#site-logo-wrap.br{right:24px;}
  #site-nav-wrap.tl,#site-nav-wrap.bl{left:24px;}
  #site-nav-wrap.tr,#site-nav-wrap.br{right:24px;}
  #proj-info-wrap.tl,#proj-info-wrap.bl{left:24px;}
  #proj-info-wrap.tr,#proj-info-wrap.br{right:24px;}
  #proj-progress-wrap.tl,#proj-progress-wrap.bl{left:24px;}
  #proj-progress-wrap.tr,#proj-progress-wrap.br{right:24px;}
  .ov-body{grid-template-columns:1fr;padding:40px 24px 60px;gap:40px;}
}
</style>
</head>
<body>
<div id="cursor" class="dot"></div>
<div id="bg-layer"></div>
<div id="bg-img-layer"></div>

<!-- Logo -->
<div id="site-logo-wrap" class="tl">
  <img class="logo-img" src="" alt="Borneo" id="site-logo">
</div>

<!-- Nav -->
<div id="site-nav-wrap" class="tr">
  <nav id="site-nav"></nav>
</div>

<!-- Stage -->
<div id="stage"></div>

<!-- Project info -->
<div id="proj-info-wrap" class="bl">
  <div class="proj-index" id="f-index"></div>
  <div class="proj-name" id="f-name"></div>
  <div class="proj-tag" id="f-tag"></div>
</div>

<!-- Progress -->
<div id="proj-progress-wrap" class="br">
  <div class="progress-row">
    <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
    <div class="progress-count" id="progress-count"></div>
  </div>
</div>

<!-- Overlay -->
<div id="overlay">
  <div class="ov-hdr">
    <img class="logo-img" src="" alt="Borneo" id="ov-logo">
    <button class="ov-close" id="ov-close">← Tutti i progetti</button>
  </div>
  <div class="ov-body">
    <div class="ov-media" id="ov-media"></div>
    <div class="ov-info">
      <h1 class="ov-title" id="ov-title"></h1>
      <dl class="ov-dets" id="ov-dets"></dl>
      <p class="ov-desc" id="ov-desc"></p>
    </div>
  </div>
</div>

<script>
let P=[],SS={},cur=0,anim=false,ovOpen=false;

async function load(){
  try{
    const r=await fetch('content.json?v='+Date.now());
    const D=await r.json();
    SS=D.site||{};
    applyBg(D);applyFonts(D);applyNav(D);applyPositions(D);applyCursor(D);
    document.getElementById('site-logo').src=D.logo||'';
    document.getElementById('ov-logo').src=D.logo||'';
    P=D.projects||[];
    buildSlides();
    if(P.length)updateFooter(0);
  }catch(e){console.error(e);}
}

function applyBg(D){
  const s=D.site||{};
  if(s.backgroundImage){
    const l=document.getElementById('bg-img-layer');
    l.style.backgroundImage=`url('${s.backgroundImage}')`;l.style.opacity='1';
  } else {
    const c=(s.background&&s.background.value)||'#fafaf8';
    document.getElementById('bg-layer').style.background=c;
    document.body.style.background=c;
  }
}

function applyFonts(D){
  const fd=(D.site&&D.site.fontDisplay)||'Cormorant';
  document.querySelectorAll('.proj-name,.ov-title,.ov-desc').forEach(el=>el.style.fontFamily=`'${fd}',serif`);
}

function applyNav(D){
  const nav=document.getElementById('site-nav');nav.innerHTML='';
  const nd=D.nav||{layout:'text',items:[{label:'Progetti',href:'#'},{label:'Studio',href:'studio.html'},{label:'Contatti',href:'contatti.html'}]};
  nd.items.forEach(item=>{
    const a=document.createElement('a');a.href=item.href||'#';
    if(nd.layout==='icons'&&item.icon){
      a.className='il-link';
      const img=document.createElement('img');img.src=item.icon;img.alt=item.label;a.appendChild(img);
    } else {
      a.className='tl-link';a.textContent=item.label;
    }
    nav.appendChild(a);
  });
}

function applyPositions(D){
  const lw=document.getElementById('site-logo-wrap');
  lw.className=D.logoLayout||'tl';
  lw.style.display=D.showLogo===false?'none':'';

  const nw=document.getElementById('site-nav-wrap');
  nw.className=D.navLayout||'tr';
  nw.style.display=D.showNav===false?'none':'';

  const pw=document.getElementById('proj-info-wrap');
  pw.className=D.infoLayout||'bl';
  pw.style.display=D.showInfo===false?'none':'';

  const prw=document.getElementById('proj-progress-wrap');
  prw.className=D.progressLayout||'br';
  prw.style.display=D.showProgress===false?'none':'';

  // Center the stage image accounting for UI elements
  // If logo/nav are at top → add top padding, if bottom → add bottom padding
  const logoPos=D.logoLayout||'tl';
  const infoPos=D.infoLayout||'bl';
  const hasTop=logoPos.startsWith('t')||(D.navLayout||'tr').startsWith('t');
  const hasBottom=infoPos.startsWith('b')||(D.progressLayout||'br').startsWith('b');
  const stage=document.getElementById('stage');
  stage.style.paddingTop=hasTop&&D.showLogo!==false?'70px':'0';
  stage.style.paddingBottom=hasBottom&&D.showInfo!==false?'70px':'0';
}

function applyCursor(D){
  const c=document.getElementById('cursor');
  if(D.cursor){c.className='img-cur';c.innerHTML=`<img src="${D.cursor}" alt="">`;document.body.style.cursor='none';}
  else{c.className='dot';}
}

function buildSlides(){
  const stage=document.getElementById('stage');stage.innerHTML='';
  P.forEach((p,i)=>{
    const st=p.imageStyle||{},dSt=SS.imageStyle||{};
    const fw=st.frameWidth||dSt.maxWidth||640;
    const fh=st.frameHeight||null;
    const radius=st.borderRadius!=null?st.borderRadius:(dSt.borderRadius||0);
    const bw=st.borderWidth!=null?st.borderWidth:(dSt.borderWidth||0);
    const bc=st.borderColor||dSt.borderColor||'transparent';
    const shadow=st.shadow!=null?st.shadow:(dSt.shadow!==false);
    const posX=st.positionX!=null?st.positionX:50;
    const posY=st.positionY!=null?st.positionY:50;
    const isPng=p.image&&/\.png$/i.test(p.image);

    const slide=document.createElement('div');
    slide.className='slide'+(i===0?' active':'');
    slide.dataset.i=i;

    const inner=document.createElement('div');
    inner.className='slide-inner';
    inner.style.width=fw+'px';inner.style.maxWidth='88vw';
    inner.style.borderRadius=radius+'px';
    inner.style.border=bw>0?`${bw}px solid ${bc}`:'none';
    inner.style.boxShadow=(shadow&&!isPng)?'0 20px 60px rgba(0,0,0,.1)':'none';
    if(fh){inner.style.height=fh+'px';inner.style.maxHeight='75vh';}
    else{inner.style.maxHeight='75vh';}

    let media;
    if(p.video){
      media=document.createElement('video');
      media.src=p.video;media.autoplay=true;media.muted=true;media.loop=true;media.playsInline=true;
    } else if(p.image){
      media=document.createElement('img');
      media.src=p.image;media.alt=p.title;media.draggable=false;
      if(isPng){media.style.background='transparent';if(shadow)media.style.filter='drop-shadow(0 12px 40px rgba(0,0,0,.15))';}
    } else {
      const ph=document.createElement('div');
      ph.style.cssText='width:100%;min-height:240px;background:#e8e6e1;display:flex;align-items:center;justify-content:center;';
      ph.innerHTML='<span style="font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:#9e9b96">Nessuna immagine</span>';
      inner.appendChild(ph);slide.appendChild(inner);stage.appendChild(slide);
      inner.addEventListener('click',()=>openProject(i));return;
    }

    if(fh){
      media.style.cssText=`width:100%;height:100%;object-fit:cover;object-position:${posX}% ${posY}%;max-width:none;max-height:none;`;
    } else {
      media.style.cssText='max-width:100%;max-height:75vh;width:auto;height:auto;object-fit:contain;background:transparent;';
    }

    inner.appendChild(media);
    inner.addEventListener('click',()=>openProject(i));
    slide.appendChild(inner);
    stage.appendChild(slide);
  });
  initSlides();
  document.querySelectorAll('.slide-inner').forEach(el=>{
    el.addEventListener('mouseenter',()=>document.getElementById('cursor').classList.add('expand'));
    el.addEventListener('mouseleave',()=>document.getElementById('cursor').classList.remove('expand'));
  });
}

function initSlides(){
  document.querySelectorAll('.slide').forEach((s,i)=>{i===0?s.style.opacity='1':hideSlide(s,1);});
}
function hideSlide(s,dir){
  const t=SS.transition||'clip';s.style.transition='none';
  if(t==='clip'){s.style.clipPath=dir>0?'inset(0 0 100% 0)':'inset(100% 0 0% 0)';s.style.opacity='1';s.style.transform='none';}
  else if(t==='fade'){s.style.opacity='0';s.style.transform='none';s.style.clipPath='none';}
  else if(t==='slide'){s.style.transform=dir>0?'translateX(100%)':'translateX(-100%)';s.style.opacity='1';s.style.clipPath='none';}
  else if(t==='scale'){s.style.transform='scale(0.88)';s.style.opacity='0';s.style.clipPath='none';}
}
function navigate(dir){
  if(anim||ovOpen||P.length<2)return;
  const slides=document.querySelectorAll('.slide'),n=slides.length;
  const next=(cur+dir+n)%n;
  const speed=SS.transitionSpeed||0.72,t=SS.transition||'clip';
  const tr=`all ${speed}s cubic-bezier(0.76,0,0.24,1)`;
  anim=true;
  const curr=slides[cur],nxt=slides[next];
  hideSlide(nxt,dir);nxt.style.zIndex='11';curr.style.zIndex='10';
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    curr.style.transition=tr;nxt.style.transition=tr;
    if(t==='clip'){curr.style.clipPath=dir>0?'inset(100% 0 0% 0)':'inset(0 0 100% 0)';nxt.style.clipPath='inset(0 0 0% 0)';}
    else if(t==='fade'){curr.style.opacity='0';nxt.style.opacity='1';}
    else if(t==='slide'){curr.style.transform=dir>0?'translateX(-100%)':'translateX(100%)';nxt.style.transform='translateX(0)';}
    else if(t==='scale'){curr.style.transform='scale(1.08)';curr.style.opacity='0';nxt.style.transform='scale(1)';nxt.style.opacity='1';}
    curr.querySelector('video')?.pause();nxt.querySelector('video')?.play();
    setTimeout(()=>{
      curr.style.transition='none';hideSlide(curr,dir);curr.style.zIndex='';nxt.style.zIndex='';
      cur=next;updateFooter(cur);anim=false;
    },speed*1000+80);
  }));
}
function updateFooter(idx){
  if(!P.length)return;
  const p=P[idx],n=P.length;
  const num=String(idx+1).padStart(2,'0'),tot=String(n).padStart(2,'0');
  document.getElementById('f-index').textContent=num+' / '+tot;
  document.getElementById('f-name').textContent=p.title;
  document.getElementById('f-tag').textContent=(p.type||'')+' — '+(p.year||'');
  document.getElementById('progress-fill').style.width=((idx+1)/n*100)+'%';
  document.getElementById('progress-count').textContent=num+' / '+tot;
  // align text for center/right positions
  const infoPos=document.getElementById('proj-info-wrap').className;
  const align=infoPos==='tc'||infoPos==='bc'?'center':infoPos==='tr'||infoPos==='br'?'right':'left';
  document.getElementById('proj-info-wrap').style.textAlign=align;
}
function openProject(idx){
  const p=P[idx];const mw=document.getElementById('ov-media');mw.innerHTML='';
  if(p.video){const v=document.createElement('video');v.src=p.video;v.autoplay=true;v.muted=true;v.loop=true;v.playsInline=true;v.style.width='100%';mw.appendChild(v);}
  else{const img=document.createElement('img');img.src=p.image||'';img.style.width='100%';img.style.background='transparent';mw.appendChild(img);}
  document.getElementById('ov-title').textContent=p.title;
  document.getElementById('ov-desc').textContent=p.description;
  document.getElementById('ov-dets').innerHTML=`<dt>Tipologia</dt><dd>${p.type||''}</dd><dt>Anno</dt><dd>${p.year||''}</dd><dt>Luogo</dt><dd>${p.location||''}</dd><dt>Stato</dt><dd>${p.status||''}</dd>`;
  const fd=SS.fontDisplay||'Cormorant';
  document.getElementById('ov-title').style.fontFamily=`'${fd}',serif`;
  document.getElementById('overlay').classList.add('open');ovOpen=true;
}
document.getElementById('ov-close').addEventListener('click',()=>{document.getElementById('overlay').classList.remove('open');ovOpen=false;document.getElementById('overlay').scrollTop=0;});
let ls=0;document.addEventListener('wheel',e=>{if(ovOpen)return;e.preventDefault();const n=Date.now();if(n-ls<120)return;ls=n;navigate(e.deltaY>0?1:-1);},{passive:false});
let ty=0;document.addEventListener('touchstart',e=>{ty=e.touches[0].clientY},{passive:true});
document.addEventListener('touchend',e=>{if(ovOpen)return;const dy=ty-e.changedTouches[0].clientY;if(Math.abs(dy)>40)navigate(dy>0?1:-1);},{passive:true});
document.addEventListener('keydown',e=>{if(e.key==='ArrowDown'||e.key==='ArrowRight')navigate(1);if(e.key==='ArrowUp'||e.key==='ArrowLeft')navigate(-1);if(e.key==='Escape'&&ovOpen){document.getElementById('overlay').classList.remove('open');ovOpen=false;}});
const curEl=document.getElementById('cursor');
document.addEventListener('mousemove',e=>{curEl.style.left=e.clientX+'px';curEl.style.top=e.clientY+'px';});
document.querySelectorAll('.ov-close,nav a').forEach(el=>{el.addEventListener('mouseenter',()=>curEl.classList.add('expand'));el.addEventListener('mouseleave',()=>curEl.classList.remove('expand'));});
load();
</script>
</body>
</html>
